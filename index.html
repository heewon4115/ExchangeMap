<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exchange Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQGxgP84T9W7VMdz92F1sDeL+sDJmZs="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #faf7f0;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #1769e0;
      --blue-soft: #eaf3ff;
      --brown: #8a5a32;
      --brown-soft: #f4e8d8;
      --purple: #7b61ff;
      --purple-soft: #f0edff;
      --green: #43a86b;
      --yellow: #f5a623;
      --red: #e5484d;
      --shadow: 0 14px 30px rgba(31, 41, 55, 0.10);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Segoe UI", system-ui, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      transition:
        transform 0.16s ease,
        box-shadow 0.16s ease,
        border-color 0.16s ease,
        background-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(23, 105, 224, 0.22);
      outline-offset: 2px;
    }

    .page {
      min-height: 100dvh;
      padding: 18px;
      display: grid;
      place-items: start center;
    }

    .phone {
      width: min(430px, 100%);
      min-height: calc(100dvh - 36px);
      background: #fffaf3;
      border: 1px solid rgba(138, 90, 50, 0.14);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(31, 41, 55, 0.16);
      overflow: hidden;
      position: relative;
    }

    .app {
      height: calc(100dvh - 36px);
      min-height: min(760px, calc(100dvh - 36px));
      overflow: auto;
      padding: 18px 16px 92px;
    }

    .app.map-mode {
      overflow: hidden;
      padding: 0 0 78px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--brown);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: var(--brown-soft);
      color: var(--brown);
      font-weight: 900;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      margin: 10px 0 12px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      color: var(--muted);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.05);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-size: 14px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 10px;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--ink);
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .chip.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #0f4fb4;
    }

    .chip.community.active {
      border-color: var(--purple);
      background: var(--purple-soft);
      color: #5139d6;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 17px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.06);
    }

    .hero-card {
      padding: 14px;
      background: linear-gradient(135deg, #fffdf8, #f3ecff);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      padding: 10px;
      border: 1px solid rgba(123, 97, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .map-card {
      overflow: hidden;
      position: relative;
    }

    #map {
      height: 330px;
      width: 100%;
      background: #dce9f5;
    }

    .map-fullscreen {
      position: relative;
      height: calc(100dvh - 114px);
      min-height: min(682px, calc(100dvh - 114px));
      background:
        linear-gradient(rgba(250, 247, 240, 0.08), rgba(250, 247, 240, 0.08)),
        #dce9f5;
      overflow: hidden;
    }

    .map-fullscreen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 450;
      background:
        radial-gradient(circle at 50% 45%, transparent 0, transparent 42%, rgba(250, 247, 240, 0.24) 100%),
        linear-gradient(180deg, rgba(250, 247, 240, 0.20), transparent 24%, transparent 72%, rgba(250, 247, 240, 0.30));
    }

    .map-fullscreen #map {
      height: 100%;
    }

    .map-top-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 700;
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 16px 42px rgba(31, 41, 55, 0.14);
      backdrop-filter: blur(18px);
      max-height: calc(100dvh - 220px);
      overflow: auto;
    }

    .map-top-panel.collapsed {
      gap: 10px;
      padding: 10px;
    }

    .map-top-panel.collapsed .topbar,
    .map-top-panel.collapsed .map-filter-area {
      display: none;
    }

    .search-toggle {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      text-align: left;
      padding: 0 14px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .map-top-panel .topbar {
      margin-bottom: 0;
    }

    .map-top-panel h1 {
      font-size: 20px;
    }

    .map-top-panel .subtitle {
      font-size: 12px;
    }

    .map-top-panel .search {
      margin: 0;
      min-height: 40px;
      box-shadow: none;
    }

    .map-top-panel .chip-row {
      padding-bottom: 0;
    }

    .map-bottom-sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      z-index: 700;
      display: grid;
      gap: 10px;
      max-height: 42dvh;
      overflow: auto;
    }

    .map-bottom-sheet .map-overlay {
      position: relative;
      left: auto;
      right: auto;
      bottom: auto;
    }

    .locate-button {
      position: absolute;
      right: 14px;
      bottom: 112px;
      z-index: 720;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.94);
      color: var(--blue);
      box-shadow: 0 12px 28px rgba(31, 41, 55, 0.18);
      backdrop-filter: blur(14px);
      font-size: 20px;
      font-weight: 900;
    }

    .map-place-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .map-place-strip::-webkit-scrollbar { display: none; }

    .map-place-chip {
      flex: 0 0 auto;
      max-width: 210px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      padding: 8px 11px;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.08);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-place-chip.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #0f4fb4;
    }

    .map-overlay {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 500;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 18px 48px rgba(31, 41, 55, 0.18);
      backdrop-filter: blur(18px);
    }

    .map-overlay[data-open-detail] {
      cursor: pointer;
    }

    .tap-hint {
      display: block;
      margin-top: 9px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .place-card {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      text-align: left;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .place-card:hover,
    .quick:hover {
      border-color: rgba(23, 105, 224, 0.35);
      box-shadow: 0 14px 28px rgba(31, 41, 55, 0.09);
    }

    .thumb {
      height: 72px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: linear-gradient(135deg, #eaf3ff, #f4e8d8);
    }

    .place-card h3,
    .map-overlay h3,
    .detail h2 {
      margin: 0 0 4px;
      font-size: 16px;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .badge {
      border-radius: 999px;
      background: #f3f4f6;
      color: #475467;
      padding: 4px 7px;
      font-size: 11px;
      font-weight: 800;
    }

    .badge.official { background: var(--blue-soft); color: #0f4fb4; }
    .badge.student { background: var(--purple-soft); color: #5139d6; }
    .badge.good { background: #e9f8ef; color: #257947; }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .quick {
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      color: var(--ink);
      display: grid;
      place-items: center;
      gap: 5px;
      padding: 10px 6px;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .quick.active {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .detail {
      padding: 16px;
      margin-top: 12px;
    }

    .detail-screen {
      position: relative;
      padding-top: 48px;
    }

    .back-top-left {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 20;
      width: auto;
      min-height: 38px;
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: 0 10px 22px rgba(31, 41, 55, 0.08);
    }

    .detail-image {
      height: 168px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.72), transparent 28%),
        linear-gradient(135deg, #eaf3ff, #f0edff 52%, #fff3df);
      font-size: 42px;
    }

    .info-block {
      margin-top: 12px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: #fffdf9;
    }

    .info-block h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .tag-stat {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }

    .tag-stat:first-of-type { border-top: 0; }
    .tag-stat span:last-child { color: var(--muted); font-weight: 800; }

    .copy-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .copy-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--blue);
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
    }

    .review {
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }

    .review:first-of-type { border-top: 0; }
    .review strong { font-size: 13px; }
    .review p { margin: 5px 0 0; color: #475467; font-size: 13px; line-height: 1.45; }

    .recommend-button {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--muted);
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .recommend-button.active {
      border-color: var(--purple);
      background: var(--purple-soft);
      color: #5139d6;
    }

    .primary {
      width: 100%;
      border: 0;
      border-radius: 16px;
      background: var(--blue);
      color: white;
      min-height: 46px;
      padding: 12px;
      font-weight: 900;
      margin-top: 12px;
      box-shadow: 0 10px 22px rgba(23, 105, 224, 0.20);
    }

    .secondary {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      color: var(--ink);
      min-height: 40px;
      padding: 8px 12px;
      font-weight: 800;
    }

    .primary:hover {
      background: #125cc6;
      box-shadow: 0 14px 28px rgba(23, 105, 224, 0.26);
    }

    .secondary:hover,
    .copy-button:hover,
    .recommend-button:hover {
      border-color: rgba(23, 105, 224, 0.32);
      background: #f8fbff;
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
      outline: 0;
    }

    .stars {
      display: flex;
      gap: 5px;
      color: var(--yellow);
      font-size: 24px;
    }

    .rating-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .rating-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--ink);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .rating-pill.active {
      border-color: var(--yellow);
      background: #fff7df;
      color: #8a5a00;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      padding: 8px 10px 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(14px);
      box-shadow: 0 -14px 30px rgba(31, 41, 55, 0.06);
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 2000;
      display: grid;
      place-items: end center;
      padding: 16px;
      background: rgba(31, 41, 55, 0.42);
    }

    .modal {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.28);
      padding: 16px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }

    .modal-head h2 {
      margin: 0 0 4px;
      font-size: 20px;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--card);
      color: var(--muted);
      font-weight: 900;
    }

    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
      color: var(--ink);
      outline: 0;
    }

    .thank-you {
      border: 1px solid rgba(67, 168, 107, 0.35);
      border-radius: 16px;
      background: #eefaf3;
      color: #246b42;
      padding: 12px;
      line-height: 1.45;
      font-size: 14px;
      font-weight: 800;
    }

    .nav-button {
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      min-height: 54px;
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 800;
    }

    .nav-button span:first-child {
      font-size: 20px;
    }

    .nav-button.active {
      background: linear-gradient(135deg, var(--brown-soft), #fff7e8);
      color: var(--brown);
      box-shadow: inset 0 0 0 1px rgba(138, 90, 50, 0.10);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .screen.active:not(#screen-map) {
      max-width: 920px;
      margin: 0 auto;
    }

    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-container {
      overflow: hidden;
      background: #dce9f5;
      outline-offset: 1px;
      font-family: Arial, "Segoe UI", system-ui, sans-serif;
    }

    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow {
      user-select: none;
      -webkit-user-drag: none;
    }

    .leaflet-tile {
      visibility: hidden;
    }

    .leaflet-tile-loaded {
      visibility: inherit;
    }

    .leaflet-zoom-animated {
      transform-origin: 0 0;
    }

    .leaflet-interactive {
      cursor: pointer;
    }

    .leaflet-top,
    .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }

    .leaflet-top { top: 0; }
    .leaflet-right { right: 0; }
    .leaflet-bottom { bottom: 0; }
    .leaflet-left { left: 0; }

    .leaflet-control {
      position: relative;
      z-index: 800;
      pointer-events: auto;
    }

    .leaflet-control-zoom {
      border: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .leaflet-control-zoom a {
      display: block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      font-weight: 900;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }

    .leaflet-popup {
      position: absolute;
      text-align: center;
      margin-bottom: 20px;
    }

    .leaflet-popup-content-wrapper {
      padding: 1px;
      text-align: left;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.2);
    }

    .leaflet-popup-content {
      margin: 12px;
      line-height: 1.4;
    }

    .leaflet-popup-tip-container {
      width: 40px;
      height: 20px;
      position: absolute;
      left: 50%;
      margin-left: -20px;
      overflow: hidden;
      pointer-events: none;
    }

    .leaflet-popup-tip {
      width: 17px;
      height: 17px;
      padding: 1px;
      margin: -10px auto 0;
      transform: rotate(45deg);
      background: #ffffff;
      box-shadow: 0 3px 14px rgba(0, 0, 0, 0.2);
    }

    .leaflet-container a.leaflet-popup-close-button {
      position: absolute;
      top: 0;
      right: 0;
      padding: 4px 4px 0 0;
      border: 0;
      text-align: center;
      width: 18px;

        const categoryOk = state.category === 'All' || place.category === state.category;
        const countryOk = state.country === 'All' || reviewsForPlace(place).some(review => review.country === state.country);
        return categoryOk && countryOk;
      });
    }

    function reviewsForPlace(place) {
      return [...(state.submittedReviews[place.id] || []), ...place.reviews];
    }

    function header(title, subtitle, eyebrow = 'Exchange Map') {
      return `
        <div class="topbar">
          <div>
            <p class="eyebrow">${eyebrow}</p>
            <h1>${title}</h1>
            <p class="subtitle">${subtitle}</p>
          </div>
          <button class="avatar" type="button" aria-label="Profile">EM</button>
        </div>
      `;
    }

    function searchBar(placeholder) {
      return `<label class="search">⌕ <input aria-label="Search" placeholder="${placeholder}" /></label>`;
    }

    function chipRow(items, active, key, className = '') {
      return `
        <div class="chip-row" data-chip-row="${key}">
          ${items.map(item => {
            const value = typeof item === 'string' ? item : item.id;
            const label = typeof item === 'string' ? item : `${item.icon} ${item.label}`;
            return `<button class="chip ${className} ${value === active ? 'active' : ''}" data-value="${value}">${label}</button>`;
          }).join('')}
        </div>
      `;
    }

    function badges(place) {
      return `<div class="badges">${place.badges.slice(0, 3).map(badge => {
        const lower = badge.toLowerCase();
        const type = lower.includes('official') ? 'official' : lower.includes('student') ? 'student' : lower.includes('english') || lower.includes('friendly') ? 'good' : '';
        return `<span class="badge ${type}">${badge}</span>`;
      }).join('')}</div>`;
    }

    function ratingStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      const empty = 5 - full - (half ? 1 : 0);
      return `${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(empty)}`;
    }

    function placeCard(place) {
      return `
        <button class="place-card" data-place-id="${place.id}">
          <div class="thumb">${place.icon}</div>
          <div>
            <h3>${place.name}</h3>
            <p class="meta">${place.category} · ★ ${place.rating} · ${place.reviewCount} student reviews · ${place.distance}</p>
            ${badges(place)}
          </div>
        </button>
      `;
    }

    function initMap() {
      const mapEl = document.getElementById('map');
      if (!mapEl || typeof L === 'undefined') return;
      if (state.map) {
        state.map.remove();
        state.map = null;
      }

      state.map = L.map('map', { zoomControl: false }).setView(state.mapView.center, state.mapView.zoom);
      L.control.zoom({ position: 'topright' }).addTo(state.map);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        subdomains: 'abcd',
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      }).addTo(state.map);

      state.markers = filteredPlaces().map(place => {
        const marker = L.marker([place.latitude, place.longitude], {
          icon: L.divIcon({
            className: `emoji-marker ${markerType(place.category)} ${place.id === state.selectedPlaceId ? 'selected' : ''}`,
            html: `<span>${place.icon}</span>`,
            iconSize: [38, 38],
            iconAnchor: [19, 38],
            popupAnchor: [0, -38]
          })
        }).addTo(state.map);
        marker.on('click', event => {
          if (event && event.originalEvent) L.DomEvent.stopPropagation(event.originalEvent);
          selectPlace(place, 'marker_click');
        });
        marker.bindPopup(`<strong>${place.name}</strong><br>${place.category} · ★ ${place.rating}`, { autoPan: false });
        if (place.id === state.selectedPlaceId) marker.setZIndexOffset(1000);
        return { placeId: place.id, marker };
      });

      if (state.userLocation) {
        L.marker(state.userLocation, {
          icon: L.divIcon({
            className: 'user-location-marker',
            html: '',
            iconSize: [22, 22],
            iconAnchor: [11, 11]
          }),
          zIndexOffset: 2000
        }).addTo(state.map).bindPopup('You are here');
      }

      state.map.on('click', () => {
        if (!state.selectedPlaceId && !state.searchOptionsOpen) return;
        state.selectedPlaceId = '';
        state.searchOptionsOpen = false;
        saveMapView();
        updateMapSelection();
      });
    }

    function markerType(category) {
      if (category === 'Hospital' || category === 'Pharmacy') return 'health';
      if (category === 'Food') return 'food';
      if (category === 'Study' || category === 'Transport') return 'community';
      if (category === 'Official') return 'community';
      return 'life';
    }

    function updateMarkerHighlights() {
      state.markers.forEach(item => {
        const isSelected = item.placeId === state.selectedPlaceId;
        const markerEl = item.marker.getElement();
        if (markerEl) markerEl.classList.toggle('selected', isSelected);
        item.marker.setZIndexOffset(isSelected ? 1000 : 0);
      });
    }

    function updateMapSelection() {
      const place = hasSelectedPlace() ? selectedPlace() : null;
      const sheet = document.getElementById('mapBottomSheet');
      const topPanel = document.querySelector('.map-top-panel');
      const searchToggle = document.querySelector('[data-search-toggle]');

      if (!sheet || !topPanel || !searchToggle) {
        renderAll();
        return;
      }

      sheet.innerHTML = mapBottomSheetHtml(place);
      topPanel.classList.toggle('collapsed', !state.searchOptionsOpen);
      searchToggle.innerHTML = `
        <span>⌕ ${state.searchOptionsOpen ? 'Hide search filters' : 'Search or filter places'}</span>
        <span>${state.searchOptionsOpen ? '↑' : '↓'}</span>
      `;
      updateMarkerHighlights();
      renderModal();
      bindEvents();
    }

    function selectPlace(place, source) {
      saveMapView();
      state.selectedPlaceId = place.id;
      state.searchOptionsOpen = false;
      trackEvent(source, {
        place_id: place.id,
        place_name: place.name,
        place_category: place.category,
        selected_country: state.country,
        selected_language: state.language
      });
      if (state.tab === 'map' && state.map) {
        updateMapSelection();
      } else {
        renderAll();
      }
      trackEvent('review_panel_open', {
        place_id: place.id,
        place_name: place.name,
        visible_review_count: reviewsForPlace(place).filter(review => state.country === 'All' || review.country === state.country).length
      });
    }

    function openDetail(place) {
      saveMapView();
      state.selectedPlaceId = place.id;
      trackEvent('place_list_click', {
        place_id: place.id,
        place_name: place.name
      });
      state.tab = 'detail';
      renderAll();
    }

    function saveMapView() {
      if (!state.map) return;
      const center = state.map.getCenter();
      state.mapView = {
        center: [center.lat, center.lng],
        zoom: state.map.getZoom()
      };
    }

    function requestCurrentLocationOnLoad() {
      if (state.locationRequested || !navigator.geolocation) return;
      state.locationRequested = true;

      navigator.geolocation.getCurrentPosition(
        position => {
          const userLocation = [position.coords.latitude, position.coords.longitude];
          state.userLocation = userLocation;
          state.mapView = {
            center: userLocation,
            zoom: 16
          };
          trackEvent('current_location_prompt', {
            location_available: 'yes',
            trigger: 'page_load'
          });
          renderAll();
        },
        () => {
          trackEvent('current_location_prompt', {
            location_available: 'no',
            trigger: 'page_load'
          });
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function bindEvents() {
      document.querySelectorAll('[data-tab]').forEach(button => {
        button.onclick = () => {
          state.tab = button.dataset.tab;
          if (state.tab === 'map') state.searchOptionsOpen = false;
          renderAll();
        };
      });

      document.querySelectorAll('[data-search-toggle]').forEach(button => {
        button.onclick = () => {
          state.searchOptionsOpen = !state.searchOptionsOpen;
          renderAll();
        };
      });

      document.querySelectorAll('[data-locate-me]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          if (!navigator.geolocation) {
            alert('Current location is not available in this browser.');
            return;
          }

          navigator.geolocation.getCurrentPosition(
            position => {
              const userLocation = [position.coords.latitude, position.coords.longitude];
              state.userLocation = userLocation;
              state.mapView = {
                center: userLocation,
                zoom: 16
              };
              state.selectedPlaceId = '';
              state.searchOptionsOpen = false;
              if (state.map) {
                state.map.setView(userLocation, 16, { animate: true });
              }
              trackEvent('current_location_click', {
                location_available: 'yes'
              });
              renderAll();
            },
            () => {
              trackEvent('current_location_click', {
                location_available: 'no'
              });
              alert(
                window.location.protocol === 'file:'
                  ? 'Location may be blocked when opened as a local file. Please test this on the Vercel HTTPS URL.'
                  : 'Location permission was not available. You can still move the map manually.'
              );
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
          );
        };
      });

      document.querySelectorAll('[data-chip-row="category"] .chip').forEach(button => {
        button.onclick = () => {
          state.category = button.dataset.value;
          state.searchOptionsOpen = true;
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="country"] .chip').forEach(button => {
        button.onclick = () => {
          state.country = button.dataset.value;
          state.searchOptionsOpen = true;
          trackEvent('country_filter_click', { country: state.country });
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="language"] .chip').forEach(button => {
        button.onclick = () => {
          state.language = button.dataset.value;
          state.searchOptionsOpen = true;
          trackEvent('language_select', { language: state.language });
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="tags"] .chip').forEach(button => {
        button.onclick = () => {
          const tag = button.dataset.value;
          if (state.selectedTags.includes(tag)) {
            state.selectedTags = state.selectedTags.filter(item => item !== tag);
          } else {
            state.selectedTags.push(tag);
          }
          renderAll();
        };
      });

      document.querySelectorAll('[data-rating]').forEach(button => {
        button.onclick = () => {
          state.selectedRating = Number(button.dataset.rating);
          renderAll();
        };
      });

      document.querySelectorAll('[data-place-id]').forEach(button => {
        if (button.dataset.reviewId) return;
        button.onclick = () => {
          const place = places.find(item => item.id === button.dataset.placeId);
          if (!place) return;
          if (state.tab === 'map' && state.selectedPlaceId === place.id) {
            openDetail(place);
            return;
          }
          selectPlace(place, 'place_list_click');
        };
      });

      document.querySelectorAll('[data-open-detail]').forEach(button => {
        button.onclick = () => {
          const place = places.find(item => item.id === button.dataset.openDetail);
          if (place) openDetail(place);
        };
      });

      document.querySelectorAll('[data-back-to-map]').forEach(button => {
        button.onclick = () => {
          state.tab = 'map';
          renderAll();
        };
      });

      document.querySelectorAll('[data-copy-address]').forEach(button => {
        button.onclick = async event => {
          event.stopPropagation();
          const place = places.find(item => item.id === button.dataset.copyAddress);
          if (!place) return;

          try {
            await navigator.clipboard.writeText(place.address);
            button.textContent = 'Copied';
            trackEvent('address_copy_click', {
              place_id: place.id,
              place_name: place.name
            });
            setTimeout(() => {
              button.textContent = 'Copy';
            }, 1200);
          } catch (error) {
            trackEvent('address_copy_click', {
              place_id: place.id,
              place_name: place.name,
              copy_available: 'no'
            });
            alert(`Copy this address:\n${place.address}`);
          }
        };
      });

      document.querySelectorAll('[data-review-id]').forEach(button => {
        button.onclick = () => {
          const reviewId = button.dataset.reviewId;
          const placeId = button.dataset.placeId;
          const place = places.find(item => item.id === placeId);
          const review = place && reviewsForPlace(place).find(item => item.id === reviewId);
          if (!place || !review) return;

          if (state.recommendedReviews.includes(reviewId)) {
            state.recommendedReviews = state.recommendedReviews.filter(item => item !== reviewId);
          } else {
            state.recommendedReviews.push(reviewId);
          }

          trackEvent('review_recommend_click', {
            place_id: place.id,
            place_name: place.name,
            review_id: review.id,
            recommended: state.recommendedReviews.includes(reviewId) ? 'yes' : 'no'
          });
          renderAll();
        };
      });

      document.querySelectorAll('#reviewCta').forEach(reviewCta => {
        reviewCta.onclick = event => {
          event.stopPropagation();
          const place = selectedPlace();
          trackEvent('review_cta_click', {
            place_id: place.id,
            place_name: place.name,
            selected_country: state.country,
            selected_language: state.language
          });
          state.reviewModalOpen = true;
          state.reviewSubmitted = false;
          renderAll();
        };
      });

      const closeReviewModal = document.getElementById('closeReviewModal');
      if (closeReviewModal) {
        closeReviewModal.onclick = () => {
          state.reviewModalOpen = false;
          renderAll();
        };
      }

      const doneReviewModal = document.getElementById('doneReviewModal');
      if (doneReviewModal) {
        doneReviewModal.onclick = () => {
          state.reviewModalOpen = false;
          renderAll();
        };
      }

      const submitReview = document.getElementById('submitReview');
      if (submitReview) {
        submitReview.onclick = () => {
          const place = selectedPlace();
          const country = document.getElementById('reviewCountry').value;
          const rating = Number(document.getElementById('reviewRating').value);
          const reviewText = document.getElementById('reviewText').value.trim();
          const newReview = {
            id: `submitted-${place.id}-${Date.now()}`,
            name: 'You',
            country,
            school: 'Seoul National University',
            language: state.language,
            rating,
            date: 'Just now',
            recommends: 0,
            text: reviewText || 'Prototype review submitted by a tester.'
          };

          state.submittedReviews = {
            ...state.submittedReviews,
            [place.id]: [newReview, ...(state.submittedReviews[place.id] || [])]
          };

          trackEvent('review_submit', {
            place_id: place.id,
            place_name: place.name,
            country,
            rating
          });
          state.reviewSubmitted = true;
          renderAll();
        };
      }

      document.querySelectorAll('[data-add-record]').forEach(button => {
        button.onclick = () => {
          state.tab = 'add';
          renderAll();
        };
      });
    }

    function renderAll() {
      renderHome();
      renderMapScreen();
      renderDetailScreen();
      renderAdd();
      renderCommunity();
      renderLog();

      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.toggle('active', screen.id === `screen-${state.tab}`);
      });
      document.querySelectorAll('.nav-button').forEach(button => {
        button.classList.toggle('active', button.dataset.tab === state.tab);
      });
      document.getElementById('appRoot').classList.toggle('map-mode', state.tab === 'map');
      renderModal();
      bindEvents();
      if (state.tab === 'map') setTimeout(() => state.map && state.map.invalidateSize(), 100);
    }

    renderAll();

    trackEvent('prototype_view', {
      page_title: document.title,
      page_location: window.location.href
    });

    const utmParams = getUtmParams();
    if (utmParams.utm_source || utmParams.utm_medium || utmParams.utm_campaign) {
      trackEvent('qr_landing', utmParams);
    }

    requestCurrentLocationOnLoad();
  </script>
</body>
</html>
