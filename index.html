<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exchange Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQGxgP84T9W7VMdz92F1sDeL+sDJmZs="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #faf7f0;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #1769e0;
      --blue-soft: #eaf3ff;
      --brown: #8a5a32;
      --brown-soft: #f4e8d8;
      --purple: #7b61ff;
      --purple-soft: #f0edff;
      --green: #43a86b;
      --yellow: #f5a623;
      --red: #e5484d;
      --shadow: 0 14px 30px rgba(31, 41, 55, 0.10);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      transition:
        transform 0.16s ease,
        box-shadow 0.16s ease,
        border-color 0.16s ease,
        background-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(23, 105, 224, 0.22);
      outline-offset: 2px;
    }

    .page {
      min-height: 100dvh;
      padding: 18px;
      display: grid;
      place-items: start center;
    }

    .phone {
      width: min(430px, 100%);
      min-height: calc(100dvh - 36px);
      background: #fffaf3;
      border: 1px solid rgba(138, 90, 50, 0.14);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(31, 41, 55, 0.16);
      overflow: hidden;
      position: relative;
    }

    .app {
      height: calc(100dvh - 36px);
      min-height: min(760px, calc(100dvh - 36px));
      overflow: auto;
      padding: 18px 16px 92px;
    }

    .app.map-mode {
      overflow: hidden;
      padding: 0 0 78px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .screen.active:not(#screen-map) .topbar {
      padding-right: 96px;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: var(--brown);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .avatar {
      display: none;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: var(--brown-soft);
      color: var(--brown);
      font-weight: 900;
    }

    .language-switcher {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 950;
      display: flex;
      gap: 2px;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.12);
      backdrop-filter: blur(16px);
    }

    .language-switcher button {
      min-width: 30px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .language-switcher button.active {
      background: var(--ink);
      color: white;
      box-shadow: 0 6px 14px rgba(31, 41, 55, 0.16);
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 46px;
      margin: 10px 0 12px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      color: var(--muted);
      box-shadow: 0 8px 20px rgba(31, 41, 55, 0.05);
    }

    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-size: 14px;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 10px;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--ink);
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .chip.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #0f4fb4;
    }

    .chip.community.active {
      border-color: var(--purple);
      background: var(--purple-soft);
      color: #5139d6;
    }

    .board-chip-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      margin: 6px 0 14px;
    }

    .board-chip {
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--card);
      color: var(--ink);
      padding: 10px 11px;
      text-align: left;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.06);
    }

    .board-chip span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .board-chip.active {
      border-color: rgba(123, 97, 255, 0.36);
      background: var(--purple-soft);
      color: #5139d6;
    }

    .tip-composer {
      display: grid;
      gap: 10px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid rgba(123, 97, 255, 0.16);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 252, 247, 0.94));
      box-shadow: 0 14px 30px rgba(31, 41, 55, 0.08);
    }

    .tip-composer h3 {
      margin: 0;
      font-size: 17px;
    }

    .community-floating-action {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 86px;
      z-index: 760;
      display: flex;
      justify-content: center;
      margin: 0;
      pointer-events: none;
    }

    .community-floating-action button {
      width: auto;
      min-width: 168px;
      min-height: 48px;
      margin: 0;
      padding: 11px 18px;
      border-radius: 999px;
      pointer-events: auto;
      background: #2563eb;
      color: white;
      box-shadow: 0 16px 40px rgba(37, 99, 235, 0.3);
    }

    .community-floating-action button::before {
      content: "\270E";
      margin-right: 8px;
      color: #facc15;
    }

    .tip-input,
    .tip-select,
    .tip-textarea,
    .comment-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      color: var(--ink);
      padding: 11px 12px;
      font-size: 13px;
    }

    .tip-textarea {
      min-height: 84px;
      resize: vertical;
    }

    .tip-card {
      padding: 14px;
      margin-bottom: 12px;
    }

    .tip-actions,
    .comment-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 9px;
    }

    .tip-comments {
      display: grid;
      gap: 6px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .tip-comment {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .recommendation-post {
      padding: 15px;
      margin-bottom: 14px;
      border: 1px solid rgba(176, 128, 78, 0.16);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(255, 248, 238, 0.92));
      cursor: pointer;
    }

    .recommendation-post h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }

    .recommendation-post > p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .cafe-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .cafe-card {
      display: grid;
      gap: 7px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.06);
    }

    .cafe-card strong {
      font-size: 15px;
    }

    .address-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .address-label {
      font-weight: 700;
    }

    .address-text {
      color: #4b5563;
    }

    .copy-address-button {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #eef2ff;
      color: #4f46e5;
    }

    .copy-address-button:hover {
      background: #e0e7ff;
    }

    .copy-success-message {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #059669;
    }

    .guide-section {
      display: grid;
      gap: 8px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .guide-section h4 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .guide-section p,
    .guide-section li {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .guide-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .cafe-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cafe-note {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .post-expand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      color: #7b4e1f;
      font-size: 13px;
      font-weight: 800;
    }

    .board-post-card {
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .board-post-card .expanded-body {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .comment-list {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .source-comment {
      padding: 9px 10px;
      border-radius: 12px;
      background: rgba(123, 97, 255, 0.07);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 20px 0 11px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 17px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.06);
    }

    .hero-card {
      padding: 16px;
      background:
        radial-gradient(circle at 20% 0%, rgba(123, 97, 255, 0.12), transparent 30%),
        linear-gradient(135deg, #fffdf8, #f3ecff);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      padding: 10px;
      border: 1px solid rgba(123, 97, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
    }

    .stat strong {
      display: block;
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .map-card {
      overflow: hidden;
      position: relative;
    }

    #map {
      height: 330px;
      width: 100%;
      background: #dce9f5;
    }

    .map-fullscreen {
      position: relative;
      height: calc(100dvh - 114px);
      min-height: min(682px, calc(100dvh - 114px));
      background:
        linear-gradient(rgba(250, 247, 240, 0.08), rgba(250, 247, 240, 0.08)),
        #dce9f5;
      overflow: hidden;
    }

    .map-fullscreen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 450;
      background:
        radial-gradient(circle at 50% 45%, transparent 0, transparent 46%, rgba(250, 247, 240, 0.18) 100%),
        linear-gradient(180deg, rgba(250, 247, 240, 0.15), transparent 25%, transparent 74%, rgba(250, 247, 240, 0.24));
    }

    .map-fullscreen #map {
      height: 100%;
    }

    .map-controls-stack {
      position: absolute;
      top: 58px;
      left: 12px;
      right: 12px;
      z-index: 700;
      display: grid;
      gap: 8px;
      align-items: start;
      pointer-events: none;
    }

    .map-controls-stack > * {
      pointer-events: auto;
    }

    .map-top-panel {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.90);
      box-shadow: 0 18px 44px rgba(31, 41, 55, 0.13);
      backdrop-filter: blur(18px);
      max-height: calc(100dvh - 220px);
      overflow: auto;
    }

    .map-search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .filter-button {
      min-height: 44px;
      border: 1px solid rgba(23, 105, 224, 0.16);
      border-radius: 16px;
      background: var(--card);
      color: var(--blue);
      padding: 0 13px;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.08);
      white-space: nowrap;
    }

    .map-category-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 1px;
      scrollbar-width: none;
    }

    .map-category-row::-webkit-scrollbar { display: none; }

    .map-category-button {
      flex: 0 0 auto;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.06);
      white-space: nowrap;
    }

    .map-category-button.active {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
      box-shadow: 0 10px 22px rgba(23, 105, 224, 0.22);
    }

    .map-filter-sheet {
      display: grid;
      gap: 14px;
      padding-top: 4px;
      border-top: 1px solid rgba(229, 231, 235, 0.9);
    }

    .filter-sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .filter-sheet-head h2,
    .filter-section h3 {
      margin: 0;
    }

    .filter-section {
      display: grid;
      gap: 8px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .feature-check {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 8px 9px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      text-align: left;
    }

    .feature-check.active {
      border-color: rgba(23, 105, 224, 0.32);
      background: var(--blue-soft);
      color: #0f4fb4;
    }

    .feature-box {
      width: 17px;
      height: 17px;
      border: 1px solid var(--line);
      border-radius: 5px;
      display: grid;
      place-items: center;
      background: white;
      color: white;
      font-size: 11px;
      flex: 0 0 auto;
    }

    .feature-check.active .feature-box {
      border-color: var(--blue);
      background: var(--blue);
    }

    .search-toggle {
      width: 100%;
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      text-align: left;
      padding: 0 14px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(31, 41, 55, 0.10);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .map-top-panel .topbar {
      margin-bottom: 0;
    }

    .map-top-panel h1 {
      font-size: 20px;
    }

    .map-top-panel .subtitle {
      font-size: 12px;
    }

    .map-top-panel .search {
      margin: 0;
      min-height: 40px;
      box-shadow: none;
    }

    .map-add-button {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      min-height: 48px;
      margin-top: 0;
      padding: 0;
      border-radius: 50%;
      font-size: 28px;
      line-height: 1;
      box-shadow: 0 12px 28px rgba(23, 105, 224, 0.26);
    }

    .map-top-panel .chip-row {
      padding-bottom: 0;
    }

    .map-bottom-sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 14px;
      z-index: 700;
      display: grid;
      gap: 10px;
      max-height: 42dvh;
      overflow: auto;
    }

    .map-bottom-sheet .map-overlay {
      position: relative;
      left: auto;
      right: auto;
      bottom: auto;
    }

    .locate-button {
      position: absolute;
      right: 14px;
      bottom: 112px;
      z-index: 720;
      width: 46px;
      height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.94);
      color: var(--blue);
      box-shadow: 0 12px 28px rgba(31, 41, 55, 0.18);
      backdrop-filter: blur(14px);
      font-size: 20px;
      font-weight: 900;
    }

    .map-place-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .map-place-strip::-webkit-scrollbar { display: none; }

    .map-place-chip {
      flex: 0 0 auto;
      max-width: 210px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      padding: 8px 11px;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.08);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-place-chip.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: #0f4fb4;
    }

    .map-overlay {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 500;
      padding: 14px;
      padding-right: 64px;
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 20px 50px rgba(31, 41, 55, 0.18);
      backdrop-filter: blur(18px);
    }

    .map-overlay[data-open-detail] {
      cursor: pointer;
    }

    .tap-hint {
      display: block;
      margin-top: 9px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
    }

    .place-card {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 12px;
      width: 100%;
      margin-bottom: 12px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      text-align: left;
      box-shadow: 0 8px 18px rgba(31, 41, 55, 0.05);
    }

    .place-card:hover,
    .quick:hover {
      border-color: rgba(23, 105, 224, 0.35);
      box-shadow: 0 14px 28px rgba(31, 41, 55, 0.09);
    }

    .thumb {
      height: 72px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 28px;
      background: linear-gradient(135deg, #eaf3ff, #f4e8d8);
    }

    .place-card h3,
    .map-overlay h3,
    .detail h2 {
      margin: 0 0 4px;
      font-size: 16px;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;

    .leaflet-pane,

      return baseCount + (state.recommendedCommunityTips.includes(`post:${postId}`) ? 1 : 0);

      const recommendId = `post:${postId}`;

      return `<button class="recommend-button ${recommended ? 'active' : ''}" data-community-post-recommend="${postId}" data-community-post-recommend-base="${baseCount}" type="button">👍 ${communityPostRecommendCount(postId, baseCount)}</button>`;

    }

    function isSupabaseId(id) {
      return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(id || '');
    }

    function formatTipDate(value) {
      if (!value || value === 'Sample' || value === 'Just now') return value || 'Just now';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    async function hashDeleteCode(value) {
      const normalized = (value || '').trim();
      if (!normalized) return '';
      if (window.crypto && window.crypto.subtle) {
        const bytes = new TextEncoder().encode(normalized);
        const hashBuffer = await window.crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(hashBuffer)).map(byte => byte.toString(16).padStart(2, '0')).join('');
      }
      return `plain:${normalized}`;
    }

    async function supabaseRequest(path, options = {}) {
      if (!hasSupabaseConfig()) throw new Error('Supabase is not configured.');
      const headers = {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        Authorization: `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
        'Content-Type': 'application/json',
        ...options.headers
      };
      const response = await fetch(`${SUPABASE_URL}${path}`, { ...options, headers });
      if (!response.ok) {
        const message = await response.text();
        throw new Error(message || `Supabase request failed: ${response.status}`);
      }
      const text = await response.text();
      return text ? JSON.parse(text) : null;
    }

    function normalizeCommunityTip(row, comments = []) {
      return {
        id: row.id,
        board: row.board || 'info',
        title: row.title || 'Untitled tip',
        body: row.body || '',
        author: row.author || 'Anonymous student',
        createdAt: formatTipDate(row.created_at),
        recommends: Number(row.recommends || 0),
        deleteCodeHash: row.delete_code_hash || '',
        comments
      };
    }

    function normalizeCommunityComment(row) {
      return {
        id: row.id,
        author: row.author || 'Anonymous student',
        text: row.body || '',
        createdAt: formatTipDate(row.created_at)
      };
    }

    async function loadCommunityTipsFromSupabase() {
      if (!hasSupabaseConfig()) return;
      state.communitySyncStatus = 'loading';
      renderAll();
      try {
        const [tips, comments] = await Promise.all([
          supabaseRequest('/rest/v1/community_tips?select=*&order=created_at.desc'),
          supabaseRequest('/rest/v1/community_comments?select=*&order=created_at.asc')
        ]);
        const commentsByTip = (comments || []).reduce((groups, row) => {
          const comment = normalizeCommunityComment(row);
          groups[row.tip_id] = [...(groups[row.tip_id] || []), comment];
          return groups;
        }, {});
        state.communityTips = (tips || []).map(row => normalizeCommunityTip(row, commentsByTip[row.id] || []));
        state.communitySyncStatus = 'online';
        saveCommunityTips();
        renderAll();
      } catch (error) {
        state.communitySyncStatus = 'local';
        console.warn('Supabase community sync failed. Falling back to browser storage.', error);
        renderAll();
      }
    }

    async function createCommunityTipInSupabase(tip) {
      const rows = await supabaseRequest('/rest/v1/community_tips', {
        method: 'POST',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify({
          board: tip.board,
          author: tip.author,
          title: tip.title,
          body: tip.body,
          recommends: tip.recommends || 0,
          delete_code_hash: tip.deleteCodeHash || ''
        })
      });
      return normalizeCommunityTip(rows[0], []);
    }

    async function deleteCommunityTipInSupabase(tipId, deleteCodeHash) {
      return supabaseRequest('/rest/v1/rpc/delete_community_tip', {
        method: 'POST',
        body: JSON.stringify({
          p_tip_id: tipId,
          p_delete_code_hash: deleteCodeHash
        })
      });
    }

    async function updateCommunityTipRecommendationInSupabase(tipId, recommends) {
      await supabaseRequest(`/rest/v1/community_tips?id=eq.${encodeURIComponent(tipId)}`, {
        method: 'PATCH',
        headers: { Prefer: 'return=minimal' },
        body: JSON.stringify({ recommends })
      });
    }

    async function createCommunityCommentInSupabase(tipId, comment) {
      const rows = await supabaseRequest('/rest/v1/community_comments', {
        method: 'POST',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify({
          tip_id: tipId,
          author: comment.author,
          body: comment.text
        })
      });
      return normalizeCommunityComment(rows[0]);
    }

    function getUtmParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        utm_source: params.get('utm_source') || '',
        utm_medium: params.get('utm_medium') || '',
        utm_campaign: params.get('utm_campaign') || ''
      };
    }

    function getPrototypeVisitorId() {
      const storageKey = 'exchange_map_visitor_id';
      try {
        let visitorId = localStorage.getItem(storageKey);
        if (!visitorId) {
          visitorId = `visitor_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
          localStorage.setItem(storageKey, visitorId);
        }
        return visitorId;
      } catch (error) {
        return 'visitor_storage_unavailable';
      }
    }

    const analyticsSessionId = `session_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    const prototypeVisitorId = getPrototypeVisitorId();

    function eventGroup(eventName) {
      if (eventName.includes('review')) return 'review';
      if (eventName.includes('filter') || eventName.includes('language') || eventName.includes('search')) return 'filter';
      if (eventName.includes('marker') || eventName.includes('place') || eventName.includes('map') || eventName.includes('location')) return 'map';
      if (eventName.includes('community')) return 'community';
      if (eventName.includes('tab') || eventName.includes('screen')) return 'navigation';
      return 'prototype';
    }

    function readableEventLabel(eventName) {
      return eventName
        .split('_')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(' ');
    }

    function analyticsContext() {
      const place = hasSelectedPlace() ? selectedPlace() : null;
      return {
        app_name: 'Exchange Map',
        prototype_version: 'snu-ga-prototype',
        visitor_id: prototypeVisitorId,
        session_id: analyticsSessionId,
        event_index: state.analyticsEventCount,
        current_tab: state.tab,
        ui_language: state.uiLanguage,
        review_language_filter: state.language,
        country_filter: state.country,
        category_filter: state.category,
        community_board: state.communityBoard,
        selected_place_id: place ? place.id : '',
        selected_place_name: place ? place.name : '',
        page_path: window.location.pathname || '/',
        page_url: window.location.href,
        ga_connected: hasRealGaId ? 'yes' : 'no'
      };
    }

    function trackEvent(eventName, params = {}) {
      state.analyticsEventCount += 1;
      const eventParams = {
        event_group: eventGroup(eventName),
        activity_label: readableEventLabel(eventName),
        ...analyticsContext(),
        ...params,
        ...getUtmParams()
      };
      console.log(`[Exchange Map event #${state.analyticsEventCount}] ${eventName}`, eventParams);
      if (hasRealGaId && typeof gtag === 'function') {
        gtag('event', eventName, eventParams);
      }
    }

    function selectedPlace() {
      return places.find(place => place.id === state.selectedPlaceId) || places[0];
    }

    function hasSelectedPlace() {
      return places.some(place => place.id === state.selectedPlaceId);
    }

    function filteredPlaces() {
      return places.filter(place => {
        const categoryOk = matchesMapCategory(place, state.category);
        const countryOk = matchesReviewCountry(place, state.country);
        const featuresOk = state.featureFilters.every(featureId => matchesFeatureFilter(place, featureId));
        return categoryOk && countryOk && featuresOk;
      });
    }

    function placeSearchText(place) {
      return `${place.name} ${(place.badges || []).join(' ')} ${(place.tags || []).join(' ')} ${(place.studentTagStats || []).map(([tag]) => tag).join(' ')}`.toLowerCase();
    }

    function isCafePlace(place) {
      const text = placeSearchText(place);
      return text.includes('cafe') || text.includes('coffee') || text.includes('dessert') || text.includes('cake') || text.includes('bakery');
    }

    function matchesMapCategory(place, category) {
      if (category === 'All') return true;
      if (category === 'Restaurants') return place.category === 'Food' && !isCafePlace(place);
      if (category === 'Cafes') return isCafePlace(place);
      return place.category === category;
    }

    function matchesReviewCountry(place, country) {
      if (country === 'All') return true;
      const mainCountries = ['Korea', 'China', 'Vietnam', 'USA', 'Spain', 'Japan'];
      return reviewsForPlace(place).some(review => {
        if (country === 'Others') return !mainCountries.includes(review.country);
        return review.country === country;
      });
    }

    function matchesFeatureFilter(place, featureId) {
      const feature = mapFeatureFilters.find(item => item.id === featureId);
      if (!feature) return true;
      const text = placeSearchText(place);
      return feature.keywords.some(keyword => text.includes(keyword.toLowerCase()));
    }

    function reviewsForPlace(place) {
      return [...(state.submittedReviews[place.id] || []), ...place.reviews];
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function translatedCategory(category) {
      return t(categoryCopyKeys[category] || category);
    }

    function translatedCountry(country) {
      const countryCopyKeys = {
        All: 'filterAll',
        Korea: 'countryKorea',
        China: 'countryChina',
        Vietnam: 'countryVietnam',
        USA: 'countryUSA',
        Spain: 'countrySpain',
        Japan: 'countryJapan',
        Others: 'countryOthers'
      };
      return t(countryCopyKeys[country] || country);
    }

    function translatedChipLabel(item, key) {
      if (typeof item === 'string') {
        if (key === 'country') return translatedCountry(item);
        return item;
      }
      if (key === 'category') return `${item.icon} ${translatedCategory(item.id)}`;
      return `${item.icon} ${item.label}`;
    }

    function reviewMeta(place) {
      return `${translatedCategory(place.category)} · ★ ${place.rating} · ${place.reviewCount} ${t('reviewCount')} · ${place.distance}`;
    }

    function chipRow(items, active, key, className = '') {
      return `
        <div class="chip-row" data-chip-row="${key}">
          ${items.map(item => {
            const value = typeof item === 'string' ? item : item.id;
            const label = translatedChipLabel(item, key);
            return `<button class="chip ${className} ${value === active ? 'active' : ''}" data-value="${value}">${label}</button>`;
          }).join('')}
        </div>
      `;
    }

    function normalizedLabel(value) {
      return value.toLowerCase().replace(/[^a-z0-9]+/g, '');
    }

    function badgeCheckCount(place, badge) {
      const badgeKey = normalizedLabel(badge);
      const stat = place.studentTagStats.find(([tag]) => normalizedLabel(tag) === badgeKey);
      if (stat) return stat[1];
      if (badge.toLowerCase().includes('student')) return place.reviewCount;
      return null;
    }

    function badges(place) {
      return `<div class="badges">${place.badges.slice(0, 3).map(badge => {
        const lower = badge.toLowerCase();
        const type = lower.includes('vegan') || lower.includes('vegetarian') ? 'vegan' : lower.includes('official') ? 'official' : lower.includes('student') ? 'student' : lower.includes('english') || lower.includes('friendly') ? 'good' : '';
        const count = badgeCheckCount(place, badge);
        return `<span class="badge ${type}">${badge}${count ? `<span class="badge-count">👍 ${count}</span>` : ''}</span>`;
      }).join('')}</div>`;
    }

    function ratingStars(rating) {
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      const empty = 5 - full - (half ? 1 : 0);
      return `${'★'.repeat(full)}${half ? '½' : ''}${'☆'.repeat(empty)}`;
    }

    function initMap() {
      const mapEl = document.getElementById('map');
      if (!mapEl || typeof L === 'undefined') return;
      if (state.map) {
        state.map.remove();
        state.map = null;
        state.userMarker = null;
      }

      state.map = L.map('map', { zoomControl: false }).setView(state.mapView.center, state.mapView.zoom);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        subdomains: 'abcd',
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
      }).addTo(state.map);
      state.map.on('moveend zoomend', saveMapView);

      state.markers = filteredPlaces().map(place => {
        const marker = L.marker([place.latitude, place.longitude], {
          icon: L.divIcon({
            className: `emoji-marker ${markerType(place.category)} ${place.id === state.selectedPlaceId ? 'selected' : ''}`,
            html: `<span>${markerIcon(place)}</span>`,
            iconSize: [38, 38],
            iconAnchor: [19, 38],
            popupAnchor: [0, -38]
          })
        }).addTo(state.map);
        marker.on('click', event => {
          if (event && event.originalEvent) L.DomEvent.stopPropagation(event.originalEvent);
          selectPlace(place, 'marker_click');
        });
        marker.bindPopup(`<strong>${place.name}</strong><br>${place.category} · ★ ${place.rating}`, { autoPan: false });
        if (place.id === state.selectedPlaceId) marker.setZIndexOffset(1000);
        return { placeId: place.id, marker };
      });

      updateUserLocationMarker();

      state.map.on('click', () => {
        if (!state.selectedPlaceId && !state.searchOptionsOpen) return;
        const hadSelectedPlace = Boolean(state.selectedPlaceId);
        const hadSearchOptionsOpen = state.searchOptionsOpen;
        state.selectedPlaceId = '';
        state.searchOptionsOpen = false;
        saveMapView();
        trackEvent('map_clear_click', {
          cleared_place: hadSelectedPlace ? 'yes' : 'no',
          closed_search_filters: hadSearchOptionsOpen ? 'yes' : 'no'
        });
        updateMapSelection();
      });
    }

    function markerType(category) {
      if (category === 'Hospital' || category === 'Pharmacy') return 'health';
      if (category === 'Food') return 'food';
      if (category === 'Study' || category === 'Transport') return 'community';
      if (category === 'Official') return 'community';
      return 'life';
    }

    function markerIcon(place) {
      const text = `${place.name} ${(place.badges || []).join(' ')} ${(place.tags || []).join(' ')}`.toLowerCase();

      if (text.includes('cafe') || text.includes('coffee') || text.includes('dessert') || text.includes('cake')) return '☕';

      const iconsByCategory = {
        Official: 'ℹ️',
        Hospital: '🏥',
        Pharmacy: '💊',
        Food: '🍚',
        Embassy: '🏛️',
        Bank: '🏧',
        Grocery: '🛒',
        Laundry: '🧺',
        Study: '📚',
        Transport: '🚌',
        Emergency: '🚨'
      };

      return iconsByCategory[place.category] || '📍';
    }

    function updateUserLocationMarker() {
      if (!state.map || !state.userLocation) return;

      if (!state.userMarker) {
        state.userMarker = L.marker(state.userLocation, {
          icon: L.divIcon({
            className: 'user-location-marker',
            html: '',
            iconSize: [22, 22],
            iconAnchor: [11, 11]
          }),
          zIndexOffset: 2000
        }).addTo(state.map).bindPopup('You are here');
        return;
      }

      state.userMarker.setLatLng(state.userLocation);
      if (!state.map.hasLayer(state.userMarker)) state.userMarker.addTo(state.map);
    }

    function updateMarkerHighlights() {
      state.markers.forEach(item => {
        const isSelected = item.placeId === state.selectedPlaceId;
        const markerEl = item.marker.getElement();
        if (markerEl) markerEl.classList.toggle('selected', isSelected);
        item.marker.setZIndexOffset(isSelected ? 1000 : 0);
      });
    }

    function updateMapSelection() {
      const place = hasSelectedPlace() ? selectedPlace() : null;
      const sheet = document.getElementById('mapBottomSheet');

      if (!sheet) {
        renderAll();
        return;
      }

      sheet.innerHTML = mapBottomSheetHtml(place);
      positionLocateButton();
      updateMarkerHighlights();
      renderModal();
      bindEvents();
    }

    function positionLocateButton() {
      const locateButton = document.querySelector('.locate-button');
      const sheet = document.querySelector('.map-bottom-sheet');
      if (!locateButton) return;

      const baseBottom = window.matchMedia('(max-width: 520px)').matches ? 98 : 108;
      if (!sheet) {
        locateButton.style.bottom = `${baseBottom}px`;
        return;
      }

      const sheetHeight = Math.ceil(sheet.getBoundingClientRect().height);
      const sheetBottom = window.matchMedia('(max-width: 520px)').matches ? 10 : 18;
      locateButton.style.bottom = `${sheetHeight + sheetBottom + 14}px`;
    }

    function selectPlace(place, source) {
      saveMapView();
      state.selectedPlaceId = place.id;
      state.searchOptionsOpen = false;
      trackEvent(source, {
        place_id: place.id,
        place_name: place.name,
        place_category: place.category,
        place_rating: place.rating,
        place_review_count: place.reviewCount,
        place_badges: place.badges.join(', '),
        place_tags: place.tags.join(', '),
        country_filter: state.country,
        language_filter: state.language
      });
      if (state.tab === 'map' && state.map) {
        updateMapSelection();
      } else {
        renderAll();
      }
      trackEvent('review_panel_open', {
        place_id: place.id,
        place_name: place.name,
        visible_review_count: reviewsForPlace(place).filter(review => state.country === 'All' || review.country === state.country).length
      });
    }

    function openDetail(place) {
      saveMapView();
      state.selectedPlaceId = place.id;
      trackEvent('place_list_click', {
        place_id: place.id,
        place_name: place.name,
        place_category: place.category,
        place_rating: place.rating,
        place_review_count: place.reviewCount
      });
      state.tab = 'detail';
      trackEvent('place_detail_open', {
        place_id: place.id,
        place_name: place.name,
        place_category: place.category,
        visible_review_count: reviewsForPlace(place).length
      });
      renderAll();
    }

    function saveMapView() {
      if (!state.map) return;
      const center = state.map.getCenter();
      state.mapView = {
        center: [center.lat, center.lng],
        zoom: state.map.getZoom()
      };
    }

    function requestCurrentLocationOnLoad() {
      if (state.locationRequested || !navigator.geolocation) return;
      state.locationRequested = true;

      navigator.geolocation.getCurrentPosition(
        position => {
          const userLocation = [position.coords.latitude, position.coords.longitude];
          state.userLocation = userLocation;
          updateUserLocationMarker();
          trackEvent('current_location_prompt', {
            location_available: 'yes',
            trigger: 'page_load'
          });
        },
        () => {
          trackEvent('current_location_prompt', {
            location_available: 'no',
            trigger: 'page_load'
          });
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function bindEvents() {
      document.querySelectorAll('[data-ui-language]').forEach(button => {
        button.onclick = () => {
          state.uiLanguage = button.dataset.uiLanguage;
          trackEvent('ui_language_select', { ui_language: state.uiLanguage });
          renderAll();
        };
      });

      document.querySelectorAll('[data-tab]').forEach(button => {
        button.onclick = () => {
          const previousTab = state.tab;
          state.tab = button.dataset.tab;
          if (state.tab === 'map') state.searchOptionsOpen = false;
          if (state.tab !== 'log') state.logFeatureId = '';
          if (state.tab !== 'community') state.communityComposerOpen = false;
          trackEvent('tab_click', {
            previous_tab: previousTab,
            destination_tab: state.tab
          });
          trackEvent('screen_view', {
            screen_name: state.tab
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-search-toggle]').forEach(button => {
        button.onclick = () => {
          state.searchOptionsOpen = !state.searchOptionsOpen;
          trackEvent('search_filter_toggle', {
            search_filters_open: state.searchOptionsOpen ? 'yes' : 'no'
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-locate-me]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          if (!navigator.geolocation) {
            alert(t('locationUnavailable'));
            return;
          }

          navigator.geolocation.getCurrentPosition(
            position => {
              const userLocation = [position.coords.latitude, position.coords.longitude];
              state.userLocation = userLocation;
              state.mapView = {
                center: userLocation,
                zoom: 16
              };
              state.selectedPlaceId = '';
              state.searchOptionsOpen = false;
              updateUserLocationMarker();
              if (state.map) {
                state.map.setView(userLocation, 16, { animate: true });
              }
              trackEvent('current_location_click', {
                location_available: 'yes'
              });
              updateMapSelection();
            },
            () => {
              trackEvent('current_location_click', {
                location_available: 'no'
              });
              alert(
                window.location.protocol === 'file:'
                  ? t('fileLocationWarning')
                  : t('locationPermissionWarning')
              );
            },
            { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
          );
        };
      });

      document.querySelectorAll('[data-chip-row="category"] .chip, [data-chip-row="category"] .map-category-button').forEach(button => {
        button.onclick = () => {
          const previousCategory = state.category;
          state.category = button.dataset.value;
          trackEvent('category_filter_click', {
            previous_category: previousCategory,
            category: state.category,
            visible_place_count: filteredPlaces().length
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="country"] .chip').forEach(button => {
        button.onclick = () => {
          const previousCountry = state.country;
          state.country = button.dataset.value;
          trackEvent('country_filter_click', {
            previous_country: previousCountry,
            country: state.country,
            visible_place_count: filteredPlaces().length
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-feature-filter]').forEach(button => {
        button.onclick = () => {
          const featureId = button.dataset.featureFilter;
          const enabled = !state.featureFilters.includes(featureId);
          state.featureFilters = enabled
            ? [...state.featureFilters, featureId]
            : state.featureFilters.filter(item => item !== featureId);
          trackEvent('map_feature_filter_click', {
            feature_filter: featureId,
            enabled: enabled ? 'yes' : 'no',
            active_feature_filters: state.featureFilters.join(', '),
            visible_place_count: filteredPlaces().length
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="language"] .chip').forEach(button => {
        button.onclick = () => {
          const previousLanguage = state.language;
          state.language = button.dataset.value;
          state.searchOptionsOpen = true;
          trackEvent('language_select', {
            previous_language: previousLanguage,
            language: state.language,
            visible_place_count: filteredPlaces().length
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-chip-row="tags"] .chip').forEach(button => {
        button.onclick = () => {
          const tag = button.dataset.value;
          if (state.selectedTags.includes(tag)) {
            state.selectedTags = state.selectedTags.filter(item => item !== tag);
          } else {
            state.selectedTags.push(tag);
          }
          renderAll();
        };
      });

      document.querySelectorAll('[data-community-board]').forEach(button => {
        button.onclick = () => {
          const previousBoard = state.communityBoard;
          state.communityBoard = button.dataset.communityBoard;
          state.expandedCommunityPost = '';
          trackEvent('community_board_click', {
            previous_board: previousBoard,
            board: state.communityBoard
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-open-tip-composer]').forEach(button => {
        button.onclick = () => {
          state.communityComposerOpen = true;
          trackEvent('community_tip_composer_open', {
            board: state.communityBoard
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-close-tip-composer]').forEach(button => {
        button.onclick = () => {
          state.communityComposerOpen = false;
          trackEvent('community_tip_composer_close', {
            board: state.communityBoard
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-community-post-toggle]').forEach(post => {
        post.onclick = () => {
          const postId = post.dataset.communityPostToggle;
          const willOpen = state.expandedCommunityPost !== postId;
          state.expandedCommunityPost = willOpen ? postId : '';
          trackEvent('community_post_toggle', {
            post_id: postId,
            expanded: willOpen ? 'yes' : 'no'
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-community-post-recommend]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          const postId = button.dataset.communityPostRecommend;
          const baseCount = Number(button.dataset.communityPostRecommendBase || 0);
          const recommendId = `post:${postId}`;
          const wasRecommended = state.recommendedCommunityTips.includes(recommendId);
          if (wasRecommended) {
            state.recommendedCommunityTips = state.recommendedCommunityTips.filter(item => item !== recommendId);
          } else {
            state.recommendedCommunityTips.push(recommendId);
          }
          saveCommunityTips();
          trackEvent('community_post_recommend_click', {
            post_id: postId,
            board: state.communityBoard,
            recommended: wasRecommended ? 'no' : 'yes',
            recommend_count: communityPostRecommendCount(postId, baseCount)
          });
          renderAll();
        };
      });

      const shareTipButton = document.getElementById('shareTipButton');
      if (shareTipButton) {
        shareTipButton.onclick = async () => {
          const board = document.getElementById('tipBoard').value;
          const author = document.getElementById('tipAuthor').value.trim() || 'Anonymous student';
          const title = document.getElementById('tipTitle').value.trim();
          const body = document.getElementById('tipBody').value.trim();
          const deleteCode = document.getElementById('tipDeleteCode').value.trim();

          if (!title || !body) {
            alert(ct('missingTitleBody'));
            return;
          }
          if (!deleteCode) {
            alert(ct('missingDeletePassword'));
            return;
          }

          const deleteCodeHash = await hashDeleteCode(deleteCode);

          const newTip = {
            id: `tip-${Date.now()}`,
            board,
            title,
            body,
            author,
            createdAt: 'Just now',
            recommends: 0,
            deleteCodeHash,
            comments: []
          };

          state.communityBoard = board;
          state.communityComposerOpen = false;
          state.communityTips = [newTip, ...state.communityTips];
          saveCommunityTips();
          trackEvent('community_tip_submit', {
            board,
            tip_id: newTip.id,
            tip_title: title,
            tip_body_length: body.length,
            has_delete_password: 'yes',
            storage_target: state.communitySyncStatus === 'online' ? 'supabase' : 'local'
          });
          renderAll();

          if (hasSupabaseConfig()) {
            try {
              const savedTip = await createCommunityTipInSupabase(newTip);
              state.communityTips = state.communityTips.map(tip => tip.id === newTip.id ? savedTip : tip);
              state.communitySyncStatus = 'online';
              saveCommunityTips();
              renderAll();
            } catch (error) {
              state.communitySyncStatus = 'local';
              console.warn('Community tip was saved locally because Supabase insert failed.', error);
              renderAll();
            }
          }
        };
      }

      document.querySelectorAll('[data-tip-recommend]').forEach(button => {
        button.onclick = async () => {
          const tipId = button.dataset.tipRecommend;
          const tip = state.communityTips.find(item => item.id === tipId);
          if (!tip) return;

          const wasRecommended = state.recommendedCommunityTips.includes(tipId);
          if (state.recommendedCommunityTips.includes(tipId)) {
            state.recommendedCommunityTips = state.recommendedCommunityTips.filter(item => item !== tipId);
          } else {
            state.recommendedCommunityTips.push(tipId);
          }
          tip.recommends = Math.max(0, Number(tip.recommends || 0) + (wasRecommended ? -1 : 1));

          saveCommunityTips();
          trackEvent('community_tip_recommend_click', {
            tip_id: tip.id,
            board: tip.board,
            recommended: state.recommendedCommunityTips.includes(tipId) ? 'yes' : 'no',
            storage_target: state.communitySyncStatus === 'online' && isSupabaseId(tip.id) ? 'supabase' : 'local'
          });
          renderAll();

          if (hasSupabaseConfig() && isSupabaseId(tip.id)) {
            try {
              await updateCommunityTipRecommendationInSupabase(tip.id, tip.recommends);
              state.communitySyncStatus = 'online';
            } catch (error) {
              state.communitySyncStatus = 'local';
              console.warn('Community recommendation was saved locally because Supabase update failed.', error);
            }
          }
        };
      });

      document.querySelectorAll('[data-tip-delete]').forEach(button => {
        button.onclick = async () => {
          const tipId = button.dataset.tipDelete;
          const tip = state.communityTips.find(item => item.id === tipId);
          if (!tip) return;

          if (!tip.deleteCodeHash) {
            alert(ct('noDeletePassword'));
            return;
          }

          const deleteCode = prompt(ct('deletePrompt'));
          if (deleteCode === null) return;
          const deleteCodeHash = await hashDeleteCode(deleteCode);

          if (hasSupabaseConfig() && isSupabaseId(tip.id)) {
            try {
              const deleted = await deleteCommunityTipInSupabase(tip.id, deleteCodeHash);
              if (!deleted) {
                alert(ct('deletePasswordWrong'));
                trackEvent('community_tip_delete_click', {
                  tip_id: tip.id,
                  board: tip.board,
                  delete_success: 'no',
                  storage_target: 'supabase'
                });
                return;
              }
              state.communityTips = state.communityTips.filter(item => item.id !== tip.id);
              state.recommendedCommunityTips = state.recommendedCommunityTips.filter(item => item !== tip.id);
              state.communitySyncStatus = 'online';
              saveCommunityTips();
              trackEvent('community_tip_delete_click', {
                tip_id: tip.id,
                board: tip.board,
                delete_success: 'yes',
                storage_target: 'supabase'
              });
              renderAll();
            } catch (error) {
              console.warn('Community tip delete failed in Supabase.', error);
              alert(ct('deleteSupabaseError'));
            }
            return;
          }

          if (tip.deleteCodeHash !== deleteCodeHash) {
            alert(ct('deletePasswordWrong'));
            trackEvent('community_tip_delete_click', {
              tip_id: tip.id,
              board: tip.board,
              delete_success: 'no',
              storage_target: 'local'
            });
            return;
          }

          state.communityTips = state.communityTips.filter(item => item.id !== tip.id);
          state.recommendedCommunityTips = state.recommendedCommunityTips.filter(item => item !== tip.id);
          saveCommunityTips();
          trackEvent('community_tip_delete_click', {
            tip_id: tip.id,
            board: tip.board,
            delete_success: 'yes',
            storage_target: 'local'
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-tip-comment-submit]').forEach(button => {
        button.onclick = async () => {
          const tipId = button.dataset.tipCommentSubmit;
          const input = document.querySelector(`[data-tip-comment-input="${tipId}"]`);
          const text = input ? input.value.trim() : '';
          const tip = state.communityTips.find(item => item.id === tipId);
          if (!tip || !text) return;

          const newComment = {
            id: `comment-${Date.now()}`,
            author: 'You',
            text,
            createdAt: 'Just now'
          };

          tip.comments = [
            ...(tip.comments || []),
            newComment
          ];

          saveCommunityTips();
          trackEvent('community_tip_comment_submit', {
            tip_id: tip.id,
            board: tip.board,
            comment_length: text.length,
            storage_target: state.communitySyncStatus === 'online' && isSupabaseId(tip.id) ? 'supabase' : 'local'
          });
          renderAll();

          if (hasSupabaseConfig() && isSupabaseId(tip.id)) {
            try {
              const savedComment = await createCommunityCommentInSupabase(tip.id, newComment);
              tip.comments = (tip.comments || []).map(comment => comment.id === newComment.id ? savedComment : comment);
              state.communitySyncStatus = 'online';
              saveCommunityTips();
              renderAll();
            } catch (error) {
              state.communitySyncStatus = 'local';
              console.warn('Community comment was saved locally because Supabase insert failed.', error);
              renderAll();
            }
          }
        };
      });

      document.querySelectorAll('[data-rating]').forEach(button => {
        button.onclick = () => {
          state.selectedRating = Number(button.dataset.rating);
          renderAll();
        };
      });

      document.querySelectorAll('[data-place-id]').forEach(button => {
        if (button.dataset.reviewId) return;
        button.onclick = () => {
          const place = places.find(item => item.id === button.dataset.placeId);
          if (!place) return;
          if (state.tab === 'map' && state.selectedPlaceId === place.id) {
            openDetail(place);
            return;
          }
          selectPlace(place, 'place_list_click');
        };
      });

      document.querySelectorAll('[data-open-detail]').forEach(button => {
        button.onclick = () => {
          const place = places.find(item => item.id === button.dataset.openDetail);
          if (place) openDetail(place);
        };
      });

      document.querySelectorAll('[data-back-to-map]').forEach(button => {
        button.onclick = () => {
          state.tab = 'map';
          renderAll();
        };
      });

      document.querySelectorAll('[data-copy-address]').forEach(button => {
        button.onclick = async event => {
          event.stopPropagation();
          const place = places.find(item => item.id === button.dataset.copyAddress);
          if (!place) return;

          try {
            await navigator.clipboard.writeText(place.address);
            button.textContent = t('copied');
            trackEvent('address_copy_click', {
              place_id: place.id,
              place_name: place.name
            });
            setTimeout(() => {
              button.textContent = t('copy');
            }, 1200);
          } catch (error) {
            trackEvent('address_copy_click', {
              place_id: place.id,
              place_name: place.name,
              copy_available: 'no'
            });
            alert(`Copy this address:\n${place.address}`);
          }
        };
      });

      document.querySelectorAll('[data-cafe-address]').forEach(button => {
        button.onclick = async event => {
          event.stopPropagation();
          const address = button.dataset.cafeAddress;
          const cafeName = button.dataset.cafeName || '';
          try {
            await navigator.clipboard.writeText(address);
            state.copiedCafeAddress = address;
            trackEvent('cafe_address_copy_click', {
              cafe_name: cafeName,
              address
            });
            renderAll();
            setTimeout(() => {
              if (state.copiedCafeAddress === address) {
                state.copiedCafeAddress = '';
                renderAll();
              }
            }, 1500);
          } catch (error) {
            trackEvent('cafe_address_copy_click', {
              cafe_name: cafeName,
              address,
              copy_available: 'no'
            });
            alert('Copy failed. Please copy the address manually.');
          }
        };
      });

      document.querySelectorAll('[data-review-id]').forEach(button => {
        button.onclick = () => {
          const reviewId = button.dataset.reviewId;
          const placeId = button.dataset.placeId;
          const place = places.find(item => item.id === placeId);
          const review = place && reviewsForPlace(place).find(item => item.id === reviewId);
          if (!place || !review) return;

          if (state.recommendedReviews.includes(reviewId)) {
            state.recommendedReviews = state.recommendedReviews.filter(item => item !== reviewId);
          } else {
            state.recommendedReviews.push(reviewId);
          }

          trackEvent('review_recommend_click', {
            place_id: place.id,
            place_name: place.name,
            place_category: place.category,
            review_id: review.id,
            review_author_country: review.country,
            review_language: review.language,
            recommended: state.recommendedReviews.includes(reviewId) ? 'yes' : 'no'
          });
          renderAll();
        };
      });

      document.querySelectorAll('#reviewCta').forEach(reviewCta => {
        reviewCta.onclick = event => {
          event.stopPropagation();
          const place = selectedPlace();
          trackEvent('review_cta_click', {
            place_id: place.id,
            place_name: place.name,
            place_category: place.category,
            country_filter: state.country,
            language_filter: state.language
          });
          state.reviewModalOpen = false;
          state.reviewSubmitted = false;
          state.tab = 'add';
          trackEvent('screen_view', { screen_name: state.tab, source: 'review_cta' });
          renderAll();
        };
      });

      const closeReviewModal = document.getElementById('closeReviewModal');
      if (closeReviewModal) {
        closeReviewModal.onclick = () => {
          trackEvent('review_modal_close', { close_source: 'x_button' });
          state.reviewModalOpen = false;
          renderAll();
        };
      }

      const doneReviewModal = document.getElementById('doneReviewModal');
      if (doneReviewModal) {
        doneReviewModal.onclick = () => {
          trackEvent('review_modal_close', { close_source: 'thank_you_done' });
          state.reviewModalOpen = false;
          renderAll();
        };
      }

      const submitReview = document.getElementById('submitReview');
      if (submitReview) {
        submitReview.onclick = () => {
          const place = selectedPlace();
          const country = document.getElementById('reviewCountry').value;
          const rating = Number(document.getElementById('reviewRating').value);
          const reviewText = document.getElementById('reviewText').value.trim();
          const newReview = {
            id: `submitted-${place.id}-${Date.now()}`,
            name: 'You',
            country,
            school: 'Seoul National University',
            language: state.language,
            rating,
            date: 'Just now',
            recommends: 0,
            text: reviewText || 'Prototype review submitted by a tester.'
          };

          state.submittedReviews = {
            ...state.submittedReviews,
            [place.id]: [newReview, ...(state.submittedReviews[place.id] || [])]
          };

          trackEvent('review_submit', {
            place_id: place.id,
            place_name: place.name,
            place_category: place.category,
            country,
            rating,
            review_text_length: reviewText.length,
            has_review_text: reviewText ? 'yes' : 'no'
          });
          state.reviewSubmitted = true;
          renderAll();
        };
      }

      document.querySelectorAll('[data-add-record]').forEach(button => {
        button.onclick = () => {
          trackEvent('add_record_click', { source_tab: state.tab });
          state.tab = 'add';
          trackEvent('screen_view', { screen_name: state.tab });
          renderAll();
        };
      });

      const saveAddRecord = document.getElementById('saveAddRecord');
      if (saveAddRecord) {
        saveAddRecord.onclick = () => {
          const place = selectedPlace();
          const reviewText = document.getElementById('addReviewText') ? document.getElementById('addReviewText').value.trim() : '';
          const memoText = document.getElementById('addMemoText') ? document.getElementById('addMemoText').value.trim() : '';
          const newReview = {
            id: `submitted-${place.id}-${Date.now()}`,
            name: 'You',
            country: state.country === 'All' ? 'USA' : state.country,
            school: 'Seoul National University',
            language: state.language,
            rating: state.selectedRating,
            date: 'Just now',
            recommends: 0,
            text: reviewText || memoText || 'Prototype review submitted by a tester.'
          };

          state.submittedReviews = {
            ...state.submittedReviews,
            [place.id]: [newReview, ...(state.submittedReviews[place.id] || [])]
          };

          trackEvent('review_submit', {
            place_id: place.id,
            place_name: place.name,
            place_category: place.category,
            country: newReview.country,
            rating: newReview.rating,
            review_text_length: newReview.text.length,
            has_review_text: reviewText || memoText ? 'yes' : 'no',
            source: 'add_screen'
          });
          state.tab = 'detail';
          renderAll();
        };
      }

      document.querySelectorAll('[data-log-feature]').forEach(button => {
        button.onclick = () => {
          state.logFeatureId = button.dataset.logFeature;
          trackEvent('my_log_feature_click', {
            feature_id: state.logFeatureId
          });
          renderAll();
        };
      });

      document.querySelectorAll('[data-log-back]').forEach(button => {
        button.onclick = () => {
          state.logFeatureId = '';
          renderAll();
        };
      });

      document.querySelectorAll('[data-log-like]').forEach(button => {
        button.onclick = () => {
          const featureId = button.dataset.logLike;
          const wasLiked = state.likedLogFeatures.includes(featureId);
          if (wasLiked) {
            state.likedLogFeatures = state.likedLogFeatures.filter(item => item !== featureId);
          } else {
            state.likedLogFeatures.push(featureId);
          }
          saveLogFeatureLikes();
          trackEvent('my_log_feature_like_click', {
            feature_id: featureId,
            liked: wasLiked ? 'no' : 'yes'
          });
          renderAll();
        };
      });
    }

    function renderAll() {
      renderLanguageSwitcher();
      renderNav();
      renderMapScreen();
      renderDetailScreen();
      renderAdd();
      renderCommunity();
      renderLog();

      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.toggle('active', screen.id === `screen-${state.tab}`);
      });
      document.querySelectorAll('.nav-button').forEach(button => {
        button.classList.toggle('active', button.dataset.tab === state.tab);
      });
      document.getElementById('appRoot').classList.toggle('map-mode', state.tab === 'map');
      renderModal();
      bindEvents();
      if (state.tab === 'map') setTimeout(() => state.map && state.map.invalidateSize(), 100);
    }

    renderAll();
    window.addEventListener('resize', positionLocateButton);

    trackEvent('prototype_view', {
      page_title: document.title,
      page_location: window.location.href,
      total_place_count: places.length,
      food_place_count: places.filter(place => place.category === 'Food').length,
      official_place_count: places.filter(place => place.isOfficial).length,
      student_reviewed_place_count: places.filter(place => place.isStudentReviewed).length
    });

    const utmParams = getUtmParams();
    if (utmParams.utm_source || utmParams.utm_medium || utmParams.utm_campaign) {
      trackEvent('qr_landing', utmParams);
    }

    loadCommunityTipsFromSupabase();
    requestCurrentLocationOnLoad();
  </script>
</body>
</html>
